name: dod-driven
version: 1
description: Default OpenSpec workflow - proposal → specs → design → tasks
artifacts:
  - id: dod
    generates: dod.md
    description: Initial definition of done
    template: dod.md
    instruction: >
      Create the definition of done document that lists the concrete checks
      required to consider the change complete.

      If `openspec/specs/dod-points/spec.md` exists, treat it as repo-specific
      guidance for what the final DoD report should emphasize. Reflect those
      points in the completion criteria when relevant, especially for
      user-facing commands, validation method, and confidence labeling.

      Usually the user provides the DoD content. If not, derive it from the
      proposal, specs, design, and tasks.

      Sections:

      - **Content**: A checklist of concrete completion criteria. Each item
      should be specific and verifiable, such as implementation completed,
      tests added or updated, validation performed, documentation updated, or
      rollout constraints addressed.

      - **Undefined**: Items that cannot be fully defined yet, including
      unknowns, blocked validations, or follow-up checks that depend on later
      decisions.

      Guidelines:

      - Write checklist items as observable outcomes, not vague intentions.

      - Prefer short actionable entries that can be checked off during review.

      - Include verification expectations where relevant: unit tests,
      integration tests, hardware validation, benchmarks, lint, or manual
      confirmation.

      - Keep the document focused on completion criteria, not implementation
      design or rationale.

apply:
  requires:
    - dod
  tracks: dod.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
